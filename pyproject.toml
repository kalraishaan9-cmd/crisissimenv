[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build-meta"

[project]
name = "crisissimenv"
version = "0.1.0"
description = "CrisisSim: Cyber-Incident Response Environment"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "openai",
    "requests",
    "pyyaml",
    "python-multipart",
    "openenv>=0.2.0"
]

[project.scripts]
server = "app:app"

[tool.setuptools]
packages = ["."]
