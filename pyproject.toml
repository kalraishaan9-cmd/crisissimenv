[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build-meta"

[project]
name = "crisissimenv"
version = "0.1.0"
description = "CrisisSim: Cyber-Incident Response Environment for OpenEnv"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi==0.109.0",
    "uvicorn==0.27.0",
    "pydantic==2.6.0",
    "openai==1.12.0",
    "requests==2.31.0",
    "pyyaml==6.0.1",
    "python-multipart==0.0.7",
    "openenv>=0.2.0"
]

[project.scripts]
server = "app:app"

[tool.setuptools]
packages = ["."]
